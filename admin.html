<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Kebab Chicken Lava</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <span class="brand-icon" style="display: flex; align-items: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </span>
                <div>
                    <span class="brand-name">Admin Panel</span>
                    <span class="brand-sub">Kebab Chicken Lava</span>
                </div>
            </div>
            <div class="topbar-right">
                <a href="index.html" class="btn-back-pos"
                    style="display:flex; text-decoration:none; align-items:center; gap: 6px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                    </svg>
                    Back to POS
                </a>
            </div>
        </div>
    </header>

    <div class="pos-wrapper" style="padding: 80px 20px 20px; flex-direction: column; gap: 20px;">

        <div
            style="background: var(--white); padding: 20px; border-radius: var(--radius-lg); border: 1.5px solid var(--border);">
            <h3 style="margin-bottom: 15px;">Kelola Menu</h3>
            <form id="admin-menu-form" style="display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;">
                <input type="hidden" id="admin-id">
                <div style="flex: 1; min-width: 120px;">
                    <label
                        style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 4px;">Kategori</label>
                    <input type="text" id="admin-category" placeholder="Contoh: Kebab" required
                        style="width: 100%; padding: 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); outline: none;">
                </div>
                <div style="flex: 2; min-width: 150px;">
                    <label
                        style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 4px;">Nama
                        Menu</label>
                    <input type="text" id="admin-name" placeholder="Nama produk" required
                        style="width: 100%; padding: 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); outline: none;">
                </div>
                <div style="flex: 1; min-width: 100px;">
                    <label
                        style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 4px;">Harga
                        (Rp)</label>
                    <input type="number" id="admin-price" placeholder="15000" required
                        style="width: 100%; padding: 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); outline: none;">
                </div>
                <button type="submit" class="process-btn" id="admin-save-btn"
                    style="width: auto; padding: 9px 16px;">Simpan</button>
                <button type="button" class="process-btn" id="admin-cancel-btn"
                    style="width: auto; padding: 9px 16px; background: var(--text-light); box-shadow: none; display: none;">Batal</button>
            </form>
        </div>

        <div
            style="background: var(--white); padding: 20px; border-radius: var(--radius-lg); border: 1.5px solid var(--border); overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem;">
                <thead>
                    <tr style="border-bottom: 2px solid var(--border); color: var(--text-muted);">
                        <th style="padding: 10px;">Kategori</th>
                        <th style="padding: 10px;">Nama Menu</th>
                        <th style="padding: 10px;">Harga</th>
                        <th style="padding: 10px; text-align: center;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="admin-menu-list"></tbody>
            </table>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="admin.js"></script>
</body>

</html>
